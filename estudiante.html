<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduCore - Sistema de Gestión Académica</title>
//entrar a la carpeta styless y luego al admindashboard.css
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<!-- ===== APP ===== -->
<div id="app">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="s-wrap">
        <div class="s-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></div>
        <div><h2>EduCore</h2><p>Gestión Académica</p></div>
        <button class="sidebar-close" onclick="closeSidebar()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
    </nav>
  </aside>
 
  <header id="header">
    <button class="hamburger" onclick="openSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="header-spacer"></div>
    <div class="header-clock" id="header-clock"></div>
    <button class="notif-btn" onclick="toast('Tienes 3 notificaciones nuevas')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-dot"></span>
    </button>
    <div class="header-user">
      <div class="avatar" id="user-avatar">E</div>
      <div class="header-user-info">
        <div class="uname" id="user-name">Hola, Estudiante</div>
        <div class="urole" id="user-role">Estudiante</div>
      </div>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="doLogout()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Salir
    </button>
  </header>
 
  <main id="main-content">
 
    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <div class="page-header"><div class="page-header-left"><h2>Dashboard</h2><p>Bienvenido al Sistema EduCore</p></div></div>
      <div class="stats-grid" id="dash-stats"></div>
</body>
</html>
